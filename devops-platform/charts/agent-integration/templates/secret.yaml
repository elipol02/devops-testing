{{/*
=============================================================================
Secret: k/v store for SENSITIVE values, base64-encoded in etcd.

IMPORTANT: Kubernetes Secrets are NOT encrypted at rest by default; they're
just base64. Production clusters enable encryption-at-rest via the API
server's EncryptionConfiguration (AKS does this automatically).

Two modes here:
  1) existingSecret (prod path): we DON'T render this template. The Secret
     is created by Sealed Secrets or External Secrets and lives in the
     cluster already. Our Deployment just envFrom-references it.
  2) createFromValues (dev path): render an inline Secret. Only acceptable
     when the chart is deployed with --set secret.values.FOO=bar and
     never commits those values to Git.

We guard with `createFromValues` so tenants explicitly opt into the insecure
path. Defaults to the safe "use an existing secret" mode.
=============================================================================
*/}}
{{- if .Values.secret.createFromValues -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agent-integration.fullname" . }}
  labels:
    {{- include "agent-integration.labels" . | nindent 4 }}
# Opaque = arbitrary key/value. Other types exist (kubernetes.io/tls,
# kubernetes.io/dockerconfigjson) but we don't need them here.
type: Opaque
# stringData lets us provide plain strings; Kubernetes base64-encodes for us.
# If we used `data:` instead we'd have to base64 ourselves.
stringData:
  {{- range $k, $v := .Values.secret.values }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
